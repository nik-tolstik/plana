services:
  postgres:
    image: postgres:17-alpine
    container_name: plana-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-plana}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-plana}
      POSTGRES_DB: ${POSTGRES_DB:-plana}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - plana_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  plana_postgres_data:
